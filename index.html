<!DOCTYPE html>
<html>
<head>
  <title>smile 💖</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: linear-gradient(135deg, #ffe6f0, #fff0f5);
    }

    .box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      z-index: 2;
      text-align: center;
    }

    .typing {
      font-size: 22px;
      color: #ff2e63;
      height: 30px;
    }

    .question {
      font-size: 32px;
      font-weight: bold;
      color: #ff2e63;
      text-shadow: 0 0 10px rgba(255, 46, 99, 0.3);
    }

    .buttons {
      display: flex;
      gap: 20px;
    }

    button {
      padding: 14px 26px;
      font-size: 18px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
    }

    #yes {
      background: #ff4d6d;
      color: white;
    }

    #no {
      background: #ccc;
      position: relative;
    }

    /* hearts */
    .heart {
      position: absolute;
      color: #ff4d6d;
      font-size: 18px;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    /* confetti */
    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      animation: fall 2s linear forwards;
    }

    @keyframes fall {
      0% { transform: translateY(-10px); opacity: 1; }
      100% { transform: translateY(100vh); opacity: 0; }
    }

    /* secret message */
    .secret {
      display: none;
      font-size: 24px;
      color: #ff4d6d;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- 🎵 MUSIC (replace file with your own mp3 if you want) -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="box">
  <div class="typing" id="typing"></div>

  <div class="question">Will you be my Valentine? 💖</div>

  <div class="buttons">
    <button id="yes">Yes 💘</button>
    <button id="no">No</button>
  </div>

  <div class="secret" id="secret">
    I knew you’d say yes 😭💖 time to get wet  
  </div>
</div>

<script>
/* typing effect */
const text = "Hey... I have something to ask you 💭";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 60);
  }
}
type();

/* runaway NO */
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * (window.innerHeight - 120);

  noBtn.style.position = "absolute";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

/* YES click */
document.getElementById("yes").addEventListener("click", () => {
  const music = document.getElementById("music");

  music.currentTime = 0; // restart
  music.volume = 1;

  const playPromise = music.play();

  if (playPromise !== undefined) {
    playPromise.catch(() => {
      alert("Tap again to enable sound 🎵");
    });
  }

  document.getElementById("secret").style.display = "block";

  for (let i = 0; i < 50; i++) {
    createConfetti();
  }
});

/* hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 200);

/* confetti */
function createConfetti() {
  const c = document.createElement("div");
  c.classList.add("confetti");

  c.style.left = Math.random() * window.innerWidth + "px";
  c.style.background = ["#ff4d6d","#ffb6c1","#ff69b4","#fff"][Math.floor(Math.random()*4)];

  document.body.appendChild(c);
  setTimeout(() => c.remove(), 2000);
}
</script>

</body>
</html>
